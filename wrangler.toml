name = "hausverwaltung"
compatibility_date = "2026-04-01"
pages_build_output_dir = "dist"

# Bindings (R2 `SYNC_BUCKET`, KV `PAIR_KV`) werden im Cloudflare-Dashboard
# unter „Settings → Functions → Bindings" verwaltet — das ist die Source of
# Truth für Production und Preview.
#
# Für lokale Entwicklung mit `wrangler pages dev`:
#   - lokale R2 + KV anlegen via `wrangler r2 bucket create …` und
#     `wrangler kv namespace create PAIR_KV --preview`
#   - dann hier wieder `[[r2_buckets]]` / `[[kv_namespaces]]` mit den
#     lokalen IDs ergänzen, oder per CLI-Flags übergeben.
